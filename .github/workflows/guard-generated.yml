name: Guard generated docs

on:
  pull_request:
    paths:
      - 'docs/cashback-portal.md'
      - 'docs/bringweb3-sdk.md'

jobs:
  block-manual-edits:
    runs-on: ubuntu-latest
    steps:
      - name: Fail with explanation
        run: |
          echo "::error::These files are auto-generated by scripts/sync-readmes.mjs."
          echo "::error::Edit the README in the source repository instead:"
          echo "::error::  docs/cashback-portal.md  -> Bring-Web3-LTD/cashbackPortal (README.md)"
          echo "::error::  docs/bringweb3-sdk.md    -> Bring-Web3-LTD/chromeExtension (extension-files/bringweb3-sdk/README.md)"
          exit 1
